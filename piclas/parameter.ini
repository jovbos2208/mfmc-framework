Part-Species8-Init1-PartDensity = 6.48497E-04  ! Number density [1/m³] (real particles)
Part-Species8-Surfaceflux1-PartDensity = 6.48497E-04  ! Number density [1/m³] (real particles)

! =============================================================================== !
! Species9 - NO
! =============================================================================== !
Part-Species9-Init1-PartDensity = 3.76136E+11  ! Number density [1/m³] (real particles)
Part-Species9-Init1-TempVib              = 273          ! Vibrational temperature [K]
Part-Species9-Init1-TempRot              = 785          ! Rotational temperature [K]
Part-Species9-Surfaceflux1-PartDensity = 3.76136E+11  ! Number density [1/m³] (real particles)
Part-Species9-Surfaceflux1-TempVib              = 273
Part-Species9-Surfaceflux1-TempRot              = 785


! =============================================================================== !
! DSMC
! =============================================================================== !
UseDSMC                          = T                                          ! Flag for using DSMC in Calculation
Particles-DSMC-CollisMode        = 2                                          ! Define mode of collision handling in DSMC (1:elast coll, 2: elast + rela, 3:chem)

! Octree
Particles-DSMC-UseOctree           = T   ! Use octree method for dynamic grid resolution based on the current mean free path and the particle number
Particles-DSMC-UseNearestNeighbour = T   ! Enable/disable the nearest neighbour search algorithm
Particles-OctreePartNumNode        = 80  ! Resolve grid until the maximum number of particles in a subcell equals OctreePartNumNode
Particles-OctreePartNumNodeMin     = 60  ! Allow grid division until the minimum number of particles in a subcell is above OctreePartNumNodeMin



