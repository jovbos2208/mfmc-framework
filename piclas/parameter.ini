Part-Species4-Init1-PartDensity = 1.25192E+14  ! Number density [1/m³] (real particles)
Part-Species4-Init1-TempVib              = 273          ! Vibrational temperature [K]
Part-Species4-Init1-TempRot              = 785          ! Rotational temperature [K]
Part-Species4-Surfaceflux1-PartDensity = 1.25192E+14  ! Number density [1/m³] (real particles)
Part-Species4-Surfaceflux1-TempVib              = 273
Part-Species4-Surfaceflux1-TempRot              = 785


! =============================================================================== !
! Species5 - Ar
! =============================================================================== !
Part-Species5-Init1-PartDensity = 1.82815E+12  ! Number density [1/m³] (real particles)
Part-Species5-Surfaceflux1-PartDensity = 1.82815E+12  ! Number density [1/m³] (real particles)

! =============================================================================== !
! Species6 - H
! =============================================================================== !
Part-Species6-Init1-PartDensity = 2.93858E+11  ! Number density [1/m³] (real particles)
Part-Species6-Surfaceflux1-PartDensity = 2.93858E+11  ! Number density [1/m³] (real particles)

! =============================================================================== !
! Species7 - N
! =============================================================================== !
Part-Species7-Init1-PartDensity = 2.34099E+13  ! Number density [1/m³] (real particles)
Part-Species7-Surfaceflux1-PartDensity = 2.34099E+13  ! Number density [1/m³] (real particles)

